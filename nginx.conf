events {
    worker_connections 1024;
}

http {
    map $http_x_amzn_oidc_data $jwt_payload {
        default "";
        "~^[^.]+\.([^.]+)\.[^.]+$" $1;
    }

    server {
        listen 8080;
        proxy_buffering off;

        location / {
            proxy_pass http://api:3080;

            proxy_set_header Host                $host;
            proxy_set_header X-Real-IP           $remote_addr;
            proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto   $scheme;

            # ── Mode A: pass the raw ALB JWT header through unchanged ────────
            # LibreChat will base64url-decode the payload and read the claims.
            # Enable by setting FORWARD_AUTH_HEADER_JWT=X-Amzn-Oidc-Data in .env
            proxy_set_header X-Amzn-Oidc-Data   $http_x_amzn_oidc_data;

            # ── Mode B: attempt to extract values from the JWT payload ────────
            # This works when the payload is plain JSON (i.e. already decoded by
            # an upstream proxy).  It does NOT work for AWS ALB because the
            # payload segment is base64url-encoded — use Mode A instead.
            set $user_email "";
            if ($jwt_payload ~* '"email":"([^"]+)"') {
                set $user_email $1;
            }

            set $user_name "";
            if ($jwt_payload ~* '"name":"([^"]+)"') {
                set $user_name $1;
            }

            proxy_set_header X-Forwarded-User    $user_email;
            proxy_set_header X-Forwarded-Email   $user_email;
            proxy_set_header X-Forwarded-Name    $user_name;

            # Websocket stability for chunk streaming
            proxy_http_version 1.1;
            proxy_set_header Upgrade             $http_upgrade;
            proxy_set_header Connection          "upgrade";
        }
    }
}
